<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="12" fill="#2563eb"/>
  <g transform="translate(8, 12)">
    <!-- Train body -->
    <rect x="8" y="10" width="32" height="24" rx="3" fill="#ffffff"/>
    
    <!-- Train windows -->
    <rect x="12" y="14" width="10" height="8" rx="1" fill="#2563eb"/>
    <rect x="26" y="14" width="10" height="8" rx="1" fill="#2563eb"/>
    
    <!-- Train front -->
    <path d="M 8 18 L 4 22 L 4 30 L 8 34 Z" fill="#dbeafe"/>
    <path d="M 40 18 L 44 22 L 44 30 L 40 34 Z" fill="#dbeafe"/>
    
    <!-- Wheels -->
    <circle cx="14" cy="36" r="3" fill="#1e40af" stroke="#ffffff" stroke-width="1"/>
    <circle cx="24" cy="36" r="3" fill="#1e40af" stroke="#ffffff" stroke-width="1"/>
    <circle cx="34" cy="36" r="3" fill="#1e40af" stroke="#ffffff" stroke-width="1"/>
    
    <!-- Train stripe -->
